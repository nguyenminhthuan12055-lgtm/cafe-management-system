version: "3.8"

services:
  # 1. Quản lý Container dành cho ứng dụng Backend
  backend:
    build: ./backend
    container_name: cafe_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_SERVER=host.docker.internal\\SQLEXPRESS # Kết nối trực tiếp với SQL Server trên máy thật
      - DB_DATABASE=CafeManagement
      - DB_USER=sa
      - DB_PASSWORD=123456
      - JWT_SECRET=Chuoi_Bi_Mat_Cuc_Ky_Bao_Mat_Cua_Join_2026
    restart: always

  # 2. Quản lý Container dành cho ứng dụng Frontend
  frontend:
    build: ./frontend
    container_name: cafe_frontend
    ports:
      - "8080:80" # Bạn truy cập giao diện bán hàng qua http://localhost:8080
    restart: always
