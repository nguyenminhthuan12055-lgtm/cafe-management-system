<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt Bàn Trước - Quán Cafe</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #f4f7f6;
        padding: 20px;
        min-height: 100vh;
      }
      .page-wrapper {
        max-width: 560px;
        margin: 0 auto;
      }
      .header-box {
        text-align: center;
        margin-bottom: 24px;
      }
      .header-box h1 {
        color: #2e7d32;
        font-size: 24px;
        margin-bottom: 6px;
      }
      .header-box p {
        color: #777;
        font-size: 14px;
      }
      .card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
        margin-bottom: 20px;
      }
      .card h2 {
        font-size: 16px;
        margin-bottom: 14px;
        color: #333;
      }
      label {
        display: block;
        font-size: 13px;
        color: #555;
        margin-bottom: 6px;
        margin-top: 12px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
      }
      textarea {
        resize: vertical;
        min-height: 60px;
      }
      .tables-preview {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 10px;
        margin-top: 10px;
      }
      .table-chip {
        border: 2px solid #4caf50;
        border-radius: 10px;
        padding: 10px;
        text-align: center;
        font-size: 13px;
        color: #333;
        background: #f4fbf4;
      }
      .table-chip.disabled {
        border-color: #ddd;
        background: #f5f5f5;
        color: #aaa;
      }
      .btn-submit {
        width: 100%;
        padding: 13px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 18px;
      }
      .btn-submit:disabled {
        background: #a5d6b3;
        cursor: not-allowed;
      }
      #form-message {
        text-align: center;
        font-size: 14px;
        min-height: 20px;
        margin-top: 12px;
      }
      #form-message.error {
        color: #dc3545;
      }
      #form-message.success {
        color: #28a745;
      }
      .staff-link {
        text-align: center;
        margin-top: 10px;
      }
      .staff-link a {
        color: #777;
        font-size: 13px;
        text-decoration: none;
      }
      .staff-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="header-box">
        <h1>☕ Đặt Bàn Trước</h1>
        <p>Giữ chỗ trước để không phải chờ đợi khi đến quán nhé!</p>
      </div>

      <div class="card">
        <h2>🪑 Bàn hiện đang trống</h2>
        <div id="tables-preview" class="tables-preview">
          <p style="grid-column: 1 / -1; color: #999; font-size: 13px">Đang tải danh sách bàn...</p>
        </div>
      </div>

      <div class="card">
        <h2>📋 Thông tin đặt bàn</h2>

        <label for="res-table">Chọn bàn</label>
        <select id="res-table">
          <option value="">-- Chọn bàn còn trống --</option>
        </select>

        <label for="res-name">Họ tên khách</label>
        <input type="text" id="res-name" placeholder="Nguyễn Văn A" />

        <label for="res-phone">Số điện thoại</label>
        <input type="tel" id="res-phone" placeholder="0909xxxxxx" />

        <label for="res-time">Thời gian đến</label>
        <input type="datetime-local" id="res-time" />

        <label for="res-guests">Số lượng khách</label>
        <input type="number" id="res-guests" min="1" placeholder="Ví dụ: 4" />

        <label for="res-note">Ghi chú (tùy chọn)</label>
        <textarea id="res-note" placeholder="Ví dụ: cần ghế trẻ em, gần cửa sổ..."></textarea>

        <button class="btn-submit" id="btn-submit-reservation" onclick="submitReservation()">
          Xác Nhận Đặt Bàn
        </button>
        <div id="form-message"></div>
      </div>

      <div class="staff-link">
        <a href="index.html">Bạn là nhân viên? Đăng nhập tại đây →</a>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:5000/";
      let availableTables = [];

      window.onload = () => {
        loadAvailableTables();
        // Mặc định gợi ý thời gian đến là 1 giờ sau hiện tại
        const now = new Date(Date.now() + 60 * 60 * 1000);
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById("res-time").value = now.toISOString().slice(0, 16);
      };

      async function loadAvailableTables() {
        const previewBox = document.getElementById("tables-preview");
        const select = document.getElementById("res-table");
        try {
          const res = await fetch(`${API_URL}api/tables`);
          const result = await res.json();
          const allTables = result.data || [];

          // Chỉ cho đặt những bàn đang thực sự trống (Available)
          availableTables = allTables.filter((t) => t.status === "Available");

          if (allTables.length === 0) {
            previewBox.innerHTML = `<p style="grid-column: 1 / -1; color:#999; font-size:13px">Quán chưa cập nhật danh sách bàn.</p>`;
            return;
          }

          previewBox.innerHTML = allTables
            .map((t) => {
              const isAvailable = t.status === "Available";
              const statusText = isAvailable ? "Trống" : t.status === "Reserved" ? "Đã có người đặt" : "Đang phục vụ";
              return `<div class="table-chip ${isAvailable ? "" : "disabled"}">
                <b>${t.table_number}</b><br/>
                ${t.capacity} người<br/>
                <span>${statusText}</span>
              </div>`;
            })
            .join("");

          if (availableTables.length === 0) {
            select.innerHTML = `<option value="">-- Hiện không còn bàn trống --</option>`;
          } else {
            select.innerHTML =
              `<option value="">-- Chọn bàn còn trống --</option>` +
              availableTables
                .map((t) => `<option value="${t.id}" data-capacity="${t.capacity}">${t.table_number} (tối đa ${t.capacity} người)</option>`)
                .join("");
          }
        } catch (err) {
          previewBox.innerHTML = `<p style="grid-column: 1 / -1; color:#dc3545; font-size:13px">Không thể tải danh sách bàn. Vui lòng thử lại sau.</p>`;
        }
      }

      async function submitReservation() {
        const msgBox = document.getElementById("form-message");
        msgBox.className = "";
        msgBox.textContent = "";

        const table_id = parseInt(document.getElementById("res-table").value);
        const customer_name = document.getElementById("res-name").value.trim();
        const phone = document.getElementById("res-phone").value.trim();
        const reservation_time = document.getElementById("res-time").value;
        const number_of_people = parseInt(document.getElementById("res-guests").value);
        const note = document.getElementById("res-note").value.trim();

        if (!table_id) {
          return showFormMessage("Vui lòng chọn 1 bàn còn trống!", "error");
        }
        if (!customer_name) {
          return showFormMessage("Vui lòng nhập họ tên!", "error");
        }
        if (!phone || phone.length < 8) {
          return showFormMessage("Vui lòng nhập số điện thoại hợp lệ!", "error");
        }
        if (!reservation_time) {
          return showFormMessage("Vui lòng chọn thời gian đến!", "error");
        }
        if (!number_of_people || number_of_people <= 0) {
          return showFormMessage("Vui lòng nhập số lượng khách hợp lệ!", "error");
        }

        const btn = document.getElementById("btn-submit-reservation");
        btn.disabled = true;
        btn.textContent = "Đang xử lý...";

        try {
          const res = await fetch(`${API_URL}api/reservations`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              table_id,
              customer_name,
              phone,
              reservation_time,
              number_of_people,
              note,
            }),
          });
          const result = await res.json();

          if (res.ok) {
            showFormMessage(result.message || "Đặt bàn thành công! Quán sẽ liên hệ xác nhận sớm nhất.", "success");
            document.getElementById("res-name").value = "";
            document.getElementById("res-phone").value = "";
            document.getElementById("res-guests").value = "";
            document.getElementById("res-note").value = "";
            document.getElementById("res-table").value = "";
            loadAvailableTables(); // cập nhật lại danh sách bàn trống
          } else {
            showFormMessage(result.message || "Đặt bàn thất bại, vui lòng thử lại!", "error");
          }
        } catch (err) {
          showFormMessage("Lỗi kết nối server!", "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Xác Nhận Đặt Bàn";
        }
      }

      function showFormMessage(text, type) {
        const msgBox = document.getElementById("form-message");
        msgBox.textContent = text;
        msgBox.className = type;
      }
    </script>
  </body>
</html>
