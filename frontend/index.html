<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Bán Hàng & Quản Lý Cafe</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #f4f7f6;
        padding: 20px;
      }
      .hidden {
        display: none !important;
      }
      .pos-container {
        display: grid;
        grid-template-columns: 1.6fr 1.4fr;
        gap: 20px;
        max-width: 1400px;
        margin: 0 auto;
      }
      .panel {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        height: calc(100vh - 40px);
        display: flex;
        flex-direction: column;
      }
      .menu-list {
        overflow-y: auto;
        flex: 1;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #eee;
      }
      th {
        background-color: #4caf50;
        color: white;
        position: sticky;
        top: 0;
      }
      .btn-add {
        background: #4caf50;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-checkout {
        background-color: #2ecc71;
        color: white;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
      }
      .btn-checkout:disabled {
        background-color: #a5d6b3;
        cursor: not-allowed;
      }
      .btn-qty {
        border: none;
        padding: 2px 8px;
        cursor: pointer;
        border-radius: 4px;
        margin: 0 5px;
      }
      #auth-error {
        color: #dc3545;
        font-size: 14px;
        margin-bottom: 10px;
        min-height: 18px;
        text-align: center;
      }
      #auth-success {
        color: #28a745;
        font-size: 14px;
        margin-bottom: 10px;
        min-height: 18px;
        text-align: center;
      }
      /* Tab chuyển đổi Đăng nhập / Đăng ký */
      .auth-tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 2px solid #eee;
      }
      .auth-tab {
        flex: 1;
        text-align: center;
        padding: 10px;
        cursor: pointer;
        font-weight: bold;
        color: #999;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
      }
      .auth-tab.active {
        color: #28a745;
        border-bottom: 2px solid #28a745;
      }
      .auth-form input {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
      }
      /* Danh mục món ăn/nước uống */
      .category-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 15px;
      }
      .category-btn {
        padding: 8px 14px;
        border-radius: 20px;
        border: 1px solid #4caf50;
        background: white;
        color: #4caf50;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }
      .category-btn.active {
        background: #4caf50;
        color: white;
      }
      #order-success-msg {
        color: #28a745;
        font-size: 13px;
        text-align: center;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <!-- Modal đăng nhập / đăng ký -->
    <div
      id="auth-modal"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background: white;
          padding: 30px;
          border-radius: 12px;
          width: 360px;
        "
      >
        <div class="auth-tabs">
          <div id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">
            Đăng Nhập
          </div>
          <div id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">
            Đăng Ký
          </div>
        </div>

        <div id="auth-error"></div>
        <div id="auth-success"></div>

        <!-- Form Đăng nhập -->
        <div id="login-form" class="auth-form">
          <input type="text" id="auth-username" placeholder="Username/Email" />
          <input type="password" id="auth-password" placeholder="Password" />
          <button
            onclick="handleAuthSubmit()"
            style="
              width: 100%;
              padding: 12px;
              background: #28a745;
              color: white;
              border: none;
              border-radius: 6px;
              cursor: pointer;
            "
          >
            Đăng Nhập
          </button>
        </div>

        <!-- Form Đăng ký -->
        <div id="register-form" class="auth-form hidden">
          <input type="text" id="register-name" placeholder="Họ và tên" />
          <input type="text" id="register-username" placeholder="Chọn Username (tối thiểu 3 ký tự)" />
          <input type="password" id="register-password" placeholder="Chọn mật khẩu (tối thiểu 6 ký tự)" />
          <input type="password" id="register-password-confirm" placeholder="Nhập lại mật khẩu" />
          <button
            onclick="handleRegisterSubmit()"
            style="
              width: 100%;
              padding: 12px;
              background: #007bff;
              color: white;
              border: none;
              border-radius: 6px;
              cursor: pointer;
            "
          >
            Đăng Ký
          </button>
        </div>
      </div>
    </div>

    <!-- Giao diện chính -->
    <div class="pos-container hidden" id="main-app">
      <div class="panel">
        <h2>☕ Thực Đơn Quán Cafe</h2>

        <!-- ✅ Danh mục món ăn/nước uống -->
        <div id="category-tabs" class="category-tabs"></div>

        <div class="menu-list">
          <table>
            <thead>
              <tr>
                <th>Tên Món</th>
                <th>Giá</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="menu-table-body"></tbody>
          </table>
        </div>
      </div>
      <div class="panel">
        <h2>
          📋 Hóa Đơn Bán Hàng
          <button
            onclick="handleLogout()"
            style="
              padding: 5px;
              background: #dc3545;
              color: white;
              border: none;
              cursor: pointer;
            "
          >
            Đăng xuất
          </button>
        </h2>
        <div id="cart-list-container" style="flex: 1"></div>
        <div style="font-weight: bold; text-align: right; padding: 8px 0" id="cart-total"></div>
        <div id="order-success-msg"></div>
        <button class="btn-checkout" id="btn-checkout" onclick="printInvoice()">
          🖨️ In Hóa Đơn & Thanh Toán
        </button>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:5000/";
      let cart = [];
      let allProducts = []; // ✅ lưu toàn bộ món để lọc theo danh mục
      let activeCategoryId = null; // null = xem tất cả

      // ---------- Xử lý modal đăng nhập/đăng ký ----------
      function showAuthModal(errorMessage) {
        document.getElementById("auth-modal").classList.remove("hidden");
        document.getElementById("main-app").classList.add("hidden");
        clearAuthMessages();
        if (errorMessage) {
          document.getElementById("auth-error").textContent = errorMessage;
        }
      }

      function showMainApp() {
        document.getElementById("auth-modal").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
      }

      function clearAuthMessages() {
        document.getElementById("auth-error").textContent = "";
        document.getElementById("auth-success").textContent = "";
      }

      function switchAuthTab(tab) {
        clearAuthMessages();
        const loginForm = document.getElementById("login-form");
        const registerForm = document.getElementById("register-form");
        const tabLogin = document.getElementById("tab-login");
        const tabRegister = document.getElementById("tab-register");

        if (tab === "register") {
          loginForm.classList.add("hidden");
          registerForm.classList.remove("hidden");
          tabLogin.classList.remove("active");
          tabRegister.classList.add("active");
        } else {
          registerForm.classList.add("hidden");
          loginForm.classList.remove("hidden");
          tabRegister.classList.remove("active");
          tabLogin.classList.add("active");
        }
      }

      // ---------- Tải thực đơn + danh mục ----------
      async function loadMenu() {
        const token = localStorage.getItem("token");
        try {
          const response = await fetch(`${API_URL}api/products`, {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (response.status === 401 || response.status === 403) {
            localStorage.clear();
            showAuthModal("Phiên đăng nhập đã hết hạn, vui lòng đăng nhập lại!");
            return;
          }
          if (!response.ok) throw new Error("Lỗi tải menu");

          const result = await response.json();
          allProducts = result.data;
          renderProducts(allProducts);
          await loadCategories();
        } catch (err) {
          console.error("Lỗi:", err);
        }
      }

      // ✅ Tải danh sách danh mục và vẽ nút bấm lọc
      async function loadCategories() {
        const token = localStorage.getItem("token");
        try {
          const response = await fetch(`${API_URL}api/categories`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!response.ok) throw new Error("Lỗi tải danh mục");
          const result = await response.json();
          renderCategoryTabs(result.data);
        } catch (err) {
          console.error("Lỗi tải danh mục:", err);
        }
      }

      function renderCategoryTabs(categories) {
        const container = document.getElementById("category-tabs");
        const allBtn = `<button class="category-btn ${activeCategoryId === null ? "active" : ""}" onclick="filterByCategory(null)">Tất cả</button>`;
        const catBtns = categories
          .map(
            (cat) =>
              `<button class="category-btn ${activeCategoryId === cat.id ? "active" : ""}" onclick="filterByCategory(${cat.id})">${cat.name}</button>`,
          )
          .join("");
        container.innerHTML = allBtn + catBtns;
      }

      // ✅ Bấm vào 1 danh mục -> chỉ hiện các món thuộc danh mục đó
      function filterByCategory(categoryId) {
        activeCategoryId = categoryId;
        const buttons = document.querySelectorAll(".category-btn");
        buttons.forEach((btn) => btn.classList.remove("active"));
        buttons.forEach((btn) => {
          if (
            (categoryId === null && btn.textContent.trim() === "Tất cả") ||
            (categoryId !== null && btn.getAttribute("onclick") === `filterByCategory(${categoryId})`)
          ) {
            btn.classList.add("active");
          }
        });

        const filtered =
          categoryId === null
            ? allProducts
            : allProducts.filter((p) => p.categoryId === categoryId);
        renderProducts(filtered);
      }

      function renderProducts(products) {
        const tbody = document.getElementById("menu-table-body");
        if (!products.length) {
          tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999; padding:20px">Không có món nào trong danh mục này</td></tr>`;
          return;
        }
        tbody.innerHTML = products
          .map(
            (item) =>
              `<tr>
              <td>${item.product_name}</td>
              <td>${item.price.toLocaleString()}đ</td>
              <td><button class="btn-add" onclick="addToCart(${item.id}, '${item.product_name.replace(/'/g, "\\'")}', ${item.price})">+</button></td>
            </tr>`,
          )
          .join("");
      }

      // ---------- Giỏ hàng ----------
      function addToCart(id, name, price) {
        const existingItem = cart.find((item) => item.id === id);
        if (existingItem) {
          existingItem.quantity += 1;
        } else {
          cart.push({ id, name, price, quantity: 1 });
        }
        renderCart();
      }

      function updateQuantity(index, delta) {
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) {
          cart.splice(index, 1);
        }
        renderCart();
      }

      function renderCart() {
        const container = document.getElementById("cart-list-container");
        container.innerHTML = cart
          .map(
            (item, index) => `
          <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;">
            <span>${item.name} (x${item.quantity})</span>
            <div>
                <span>${(item.price * item.quantity).toLocaleString()}đ</span>
                <button class="btn-qty" onclick="updateQuantity(${index}, -1)" style="background:#ff9800">-</button>
                <button class="btn-qty" onclick="updateQuantity(${index}, 1)" style="background:#4caf50; color:white">+</button>
            </div>
          </div>
        `,
          )
          .join("");

        const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        document.getElementById("cart-total").textContent = cart.length
          ? `Tổng cộng: ${total.toLocaleString()}đ`
          : "";
      }

      // ---------- Đăng nhập ----------
      async function handleAuthSubmit() {
        const username = document.getElementById("auth-username").value;
        const password = document.getElementById("auth-password").value;

        clearAuthMessages();

        if (!username || !password) {
          document.getElementById("auth-error").textContent =
            "Vui lòng nhập đầy đủ tài khoản và mật khẩu!";
          return;
        }

        try {
          const res = await fetch(`${API_URL}api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const result = await res.json();
          if (res.ok) {
            localStorage.setItem("token", result.data.token);
            showMainApp();
            loadMenu();
          } else {
            document.getElementById("auth-error").textContent =
              result.message || "Đăng nhập thất bại!";
          }
        } catch (err) {
          document.getElementById("auth-error").textContent = "Lỗi kết nối server!";
        }
      }

      // ---------- Đăng ký ----------
      async function handleRegisterSubmit() {
        const name = document.getElementById("register-name").value.trim();
        const username = document.getElementById("register-username").value.trim();
        const password = document.getElementById("register-password").value;
        const passwordConfirm = document.getElementById("register-password-confirm").value;

        clearAuthMessages();

        if (!name || !username || !password || !passwordConfirm) {
          document.getElementById("auth-error").textContent =
            "Vui lòng nhập đầy đủ thông tin đăng ký!";
          return;
        }
        if (username.length < 3) {
          document.getElementById("auth-error").textContent =
            "Tên tài khoản phải có ít nhất 3 ký tự!";
          return;
        }
        if (password.length < 6) {
          document.getElementById("auth-error").textContent =
            "Mật khẩu phải có ít nhất 6 ký tự!";
          return;
        }
        if (password !== passwordConfirm) {
          document.getElementById("auth-error").textContent =
            "Mật khẩu nhập lại không khớp!";
          return;
        }

        try {
          const res = await fetch(`${API_URL}api/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, username, password }),
          });
          const result = await res.json();

          if (res.ok) {
            switchAuthTab("login");
            document.getElementById("auth-success").textContent =
              "Đăng ký thành công! Vui lòng đăng nhập.";
            document.getElementById("auth-username").value = username;
            document.getElementById("register-name").value = "";
            document.getElementById("register-username").value = "";
            document.getElementById("register-password").value = "";
            document.getElementById("register-password-confirm").value = "";
          } else {
            document.getElementById("auth-error").textContent =
              result.message || "Đăng ký thất bại!";
          }
        } catch (err) {
          document.getElementById("auth-error").textContent = "Lỗi kết nối server!";
        }
      }

      function handleLogout() {
        localStorage.clear();
        cart = [];
        allProducts = [];
        activeCategoryId = null;
        showAuthModal();
      }

      window.onload = () => {
        localStorage.clear();
        showAuthModal();
      };

      // ---------- ✅ Thanh toán: gọi API lưu hóa đơn vào SQL Server ----------
      async function printInvoice() {
        const successBox = document.getElementById("order-success-msg");
        successBox.textContent = "";
        successBox.style.color = "#28a745";

        if (cart.length === 0) {
          successBox.style.color = "#dc3545";
          successBox.textContent = "Giỏ hàng đang trống, vui lòng chọn món trước!";
          return;
        }

        const token = localStorage.getItem("token");
        const total_amount = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        const items = cart.map((item) => ({
          id: item.id,
          quantity: item.quantity,
          price: item.price,
        }));

        const checkoutBtn = document.getElementById("btn-checkout");
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = "Đang xử lý...";

        try {
          const res = await fetch(`${API_URL}api/orders`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ total_amount, items }),
          });

          if (res.status === 401 || res.status === 403) {
            localStorage.clear();
            showAuthModal("Phiên đăng nhập đã hết hạn, vui lòng đăng nhập lại!");
            return;
          }

          const result = await res.json();

          if (res.ok) {
            // ✅ Đơn hàng đã được lưu vào bảng Orders + OrderDetails trên SQL Server
            successBox.textContent = result.message || "Thanh toán thành công! Hóa đơn đã được lưu.";
            cart = [];
            renderCart();
          } else {
            successBox.style.color = "#dc3545";
            successBox.textContent = result.message || "Thanh toán thất bại!";
          }
        } catch (err) {
          successBox.style.color = "#dc3545";
          successBox.textContent = "Lỗi kết nối server!";
        } finally {
          checkoutBtn.disabled = false;
          checkoutBtn.textContent = "🖨️ In Hóa Đơn & Thanh Toán";
        }
      }
    </script>
  </body>
</html>
